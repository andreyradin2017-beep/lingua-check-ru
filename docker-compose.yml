services:
  db:
    image: postgres:16-alpine
    container_name: linguacheck_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: linguacheck
      POSTGRES_PASSWORD: linguacheck_secret
      POSTGRES_DB: linguacheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linguacheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linguacheck_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://linguacheck:linguacheck_secret@db:5432/linguacheck
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
