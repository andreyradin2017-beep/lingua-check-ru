<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка LinguaCheck</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; }
        .ok { color: green; }
        .error { color: red; }
        .check { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Проверка LinguaCheck-RU</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        
        async function check(url, name) {
            try {
                const response = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
                return { ok: response.ok, status: response.status };
            } catch (e) {
                return { ok: false, error: e.message };
            }
        }

        async function runChecks() {
            const checks = [
                { url: 'http://127.0.0.1:5173', name: 'Frontend (порт 5173)' },
                { url: 'http://127.0.0.1:8000', name: 'Backend (порт 8000)' },
                { url: 'http://127.0.0.1:8000/api/v1/health', name: 'Backend Health' },
            ];

            for (const check of checks) {
                const div = document.createElement('div');
                div.className = 'check';
                
                const result = await check(check.url, check.name);
                
                if (result.ok) {
                    div.innerHTML = `<strong class="ok">✅ ${check.name}</strong> - Статус: ${result.status}`;
                } else {
                    div.innerHTML = `<strong class="error">❌ ${check.name}</strong> - Ошибка: ${result.error || result.status}`;
                }
                
                results.appendChild(div);
            }

            // Авто-редирект через 3 секунды если всё OK
            setTimeout(() => {
                const allOk = document.querySelectorAll('.ok').length === checks.length;
                if (allOk) {
                    window.location.href = 'http://127.0.0.1:5173';
                }
            }, 3000);
        }

        runChecks();
    </script>
</body>
</html>
